# x-monitor Configuration File

[general]
# Polling interval in seconds (minimum 10)
poll_interval_sec = 300

# Nitter instance to use (see https://github.com/zedeus/nitter/wiki/Instances)
nitter_instance = "https://nitter.net"

# Maximum number of tweets to keep per user
max_tweets = 400

# Filter out reply tweets (true = show only original tweets and retweets)
filter_replies = true

# Persist state between sessions (true = save and restore tweet history)
persist_state = true

# Maximum tweets to save to disk (across all users)
max_saved_tweets = 1000

# Incremental save (only save new tweets to reduce disk I/O)
incremental_save = true

# Merge incremental file into main file after this many new tweets
merge_threshold = 50

[users]
# List of Twitter handles to monitor (without @ symbol)
handles = ["karpathy", "dotey", "op7418", "chengfeng240928", "bcherny", "lijigang", "123olp", "AI_Whisper_X", "vista8"]

[notification]
# Enable notifications
enable = true

# Terminal bell sound
sound = true

# Terminal flash visual alert
flash = true

# Desktop notifications (requires plyer)
desktop = false

[ui]
# Color theme: "dark" or "light"
theme = "dark"

# Show timestamps in tweet list
show_timestamps = true

# Auto-scroll to new tweets
auto_scroll = true
